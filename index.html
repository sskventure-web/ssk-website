    var p = document.body || document.documentElement;

      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {

            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();

            while (true) {
              const { done, value } = await reader.read();

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.

      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>

    // attributes through, so match the full opening tag. slice() rather than

    const headOpen = template.match(/<head[^>]*>/i);

      template = template.slice(0, i) + resourceScript + template.slice(i);

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to

    const doc = new DOMParser().parseFromString(template, 'text/html');

      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;

    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }

    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

m.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"how-step\">\n      <div class=\"how-step-num\">03<\u002Fdiv>\n      <div class=\"how-step-title\">Capital &amp; Returns<\u002Fdiv>\n      <div class=\"how-step-body\">Co-investors contribute the majority of capital and receive a significant share of profit. SSK aligns its own capital in every deal — our upside is tied directly to your returns.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"nav-structure sr\" style=\"margin-top:48px;grid-template-columns:1fr\">\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ── REAL ESTATE ── -->\n<section id=\"realestate\">\n  <div class=\"eyebrow sr\">Real Estate Projects<\u002Fdiv>\n  <h2 class=\"section-title sr\">Investing where value<br>can be created.<\u002Fh2>\n  <p class=\"section-body sr\" style=\"max-width:580px\">SSK invests and develops Real Estate projects across Sweden, UK and Spain. The focus is on projects with clear value-adding opportunities. Minimum target Profit/CoS of 20%+ and ROE above 40%.<\u002Fp>\n  <div class=\"re-grid\">\n    <div class=\"re-card sr\">\n      <div class=\"re-card-img\">\n        <span class=\"re-flag\">Sweden<\u002Fspan>\n        <div class=\"re-card-geo-text\">SWE<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"re-card-body\">\n        <h3 class=\"re-card-title\">Ski-Resort Development<\u002Fh3>\n        <p class=\"re-card-desc\">Ski-resort development with a total of 92 houses. Three stages are completed. End value of the assets could reach EUR 35m+.<\u002Fp>\n        <div class=\"re-metrics\">\n          <div><div class=\"re-metric-label\">End value<\u002Fdiv><div class=\"re-metric-value\">EUR 35M+<\u002Fdiv><\u002Fdiv>\n          <div><div class=\"re-metric-label\">Units<\u002Fdiv><div class=\"re-metric-value\">92 houses<\u002Fdiv><\u002Fdiv>\n          <div><div class=\"re-metric-label\">Stages done<\u002Fdiv><div class=\"re-metric-value\">3 of 3<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"re-card sr\" style=\"transition-delay:.1s\">\n      <div class=\"re-card-img\" style=\"background:#1a2a3a\">\n        <span class=\"re-flag\">Spain<\u002Fspan>\n        <div class=\"re-card-geo-text\">ESP<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"re-card-body\">\n        <h3 class=\"re-card-title\">Luxury Villa, Marbella<\u002Fh3>\n        <p class=\"re-card-desc\">A luxury villa development with a sales price of EUR 4M in Marbella, Spain. Developed 100% with equity, limiting financial risk. The ROE reached 62%.<\u002Fp>\n        <div class=\"re-metrics\">\n          <div><div class=\"re-metric-label\">Sales price<\u002Fdiv><div class=\"re-metric-value\">EUR 4.95M<\u002Fdiv><\u002Fdiv>\n          <div><div class=\"re-metric-label\">ROE<\u002Fdiv><div class=\"re-metric-value\" style=\"color:#1a7a50\">62%<\u002Fdiv><\u002Fdiv>\n          <div><div class=\"re-metric-label\">Status<\u002Fdiv><div class=\"re-metric-value\">100% equity<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"re-card sr\" style=\"transition-delay:.2s\">\n      <div class=\"re-card-img\" style=\"background:#0f2235\">\n        <span class=\"re-flag\">Spain<\u002Fspan>\n        <div class=\"re-card-geo-text\">ESP<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"re-card-body\">\n        <h3 class=\"re-card-title\">Ultra-Prime, Marbella<\u002Fh3>\n        <p class=\"re-card-desc\">A project under contract with an expected sales value of EUR 11M. Ultra-prime assets in the heart of Marbella, Spain. Currently under development.<\u002Fp>\n        <div class=\"re-metrics\">\n          <div><div class=\"re-metric-label\">Expected value<\u002Fdiv><div class=\"re-metric-value\">EUR 11M<\u002Fdiv><\u002Fdiv>\n          <div><div class=\"re-metric-label\">Location<\u002Fdiv><div class=\"re-metric-value\">Marbella<\u002Fdiv><\u002Fdiv>\n          <div><div class=\"re-metric-label\">Status<\u002Fdiv><div class=\"re-metric-value\">Under contract<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ── CTA ── -->\n<section id=\"cta\">\n  <div class=\"cta-grid-bg\"><\u002Fdiv>\n  <div class=\"cta-inner sr\">\n    <div class=\"eyebrow\" style=\"justify-content:center\">Let's talk<\u002Fdiv>\n    <h2 class=\"section-title\">Ready to invest<br>alongside us?<\u002Fh2>\n    <p class=\"section-body\">Whether you're a qualified investor looking for co-investment access or a founder seeking a hands-on capital partner — we'd love to hear from you.<\u002Fp>\n    <div class=\"cta-btns\">\n      <a href=\"mailto:invest@sskventure.com\" class=\"btn-primary\">Co-invest with SSK<\u002Fa>\n      <a href=\"mailto:founders@sskventure.com\" class=\"btn-outline\">For Founders<\u002Fa>\n    <\u002Fdiv>\n    <div class=\"cta-note\">Qualified investors only · Minimum ticket EUR 50k · Deal-by-deal access<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ── FOOTER ── -->\n<footer>\n  <div class=\"footer-top\">\n    <div>\n      <div class=\"footer-brand-name\">SSK Venture Holdings<\u002Fdiv>\n      <div class=\"footer-brand-sub\">Real Estate &amp; Financial Services<\u002Fdiv>\n      <p class=\"footer-desc\">Partnering with investors and founders across Real Estate and Financial Services since 2016. Active in Sweden, Spain, and the United Kingdom.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"footer-col\">\n      <div class=\"footer-col-title\">Company<\u002Fdiv>\n      <a href=\"#about\">About<\u002Fa>\n      <a href=\"#areas\">Business Areas<\u002Fa>\n      <a href=\"#nav-section\">How We Operate<\u002Fa>\n    <\u002Fdiv>\n    <div class=\"footer-col\">\n      <div class=\"footer-col-title\">Invest<\u002Fdiv>\n      <a href=\"#portfolio\">Portfolio<\u002Fa>\n      <a href=\"#track\">Track Record<\u002Fa>\n      <a href=\"#cta\">Co-investment Access<\u002Fa>\n    <\u002Fdiv>\n    <div class=\"footer-col\">\n      <div class=\"footer-col-title\">Contact<\u002Fdiv>\n      <a href=\"mailto:invest@sskventure.com\">invest@sskventure.com<\u002Fa>\n      <a href=\"mailto:founders@sskventure.com\">founders@sskventure.com<\u002Fa>\n      <a href=\"#\">LinkedIn<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"footer-bottom\">\n    <span>© 2025 SSK Venture Holdings. All rights reserved.<\u002Fspan>\n    <span>Past performance is not indicative of future results. This page does not constitute investment advice.<\u002Fspan>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<script>\n// ── Tabs ──\nfunction switchTab(id, btn) {\n  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));\n  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));\n  document.getElementById('tab-' + id).classList.add('active');\n  btn.classList.add('active');\n}\n\n// ── Animated counters (hero) ──\nfunction animCount(el, target, prefix, suffix, dur) {\n  const start = Date.now();\n  const tick = () => {\n    const p = Math.min((Date.now() - start) / dur, 1);\n    const e = 1 - Math.pow(1 - p, 3);\n    el.textContent = (prefix||'') + Math.round(target * e) + (suffix||'');\n    if (p < 1) requestAnimationFrame(tick);\n  };\n  requestAnimationFrame(tick);\n}\n\n\n// ── Scroll reveals: elements are visible by default;\n//    JS adds .hidden immediately then uses IntersectionObserver to reveal ──\nconst srEls = document.querySelectorAll('.sr');\nconst observer = new IntersectionObserver((entries) => {\n  entries.forEach(entry => {\n    if (entry.isIntersecting) {\n      entry.target.classList.remove('hidden');\n      entry.target.classList.add('visible');\n      observer.unobserve(entry.target);\n    }\n  });\n}, { threshold: 0.08, rootMargin: '0px 0px -30px 0px' });\n\nsrEls.forEach(el => {\n  const rect = el.getBoundingClientRect();\n  if (rect.top < window.innerHeight) {\n    // Already in viewport — show immediately\n    el.classList.add('visible');\n  } else {\n    el.classList.add('hidden');\n    observer.observe(el);\n  }\n});\n\n// ── Bar chart animation on scroll ──\nlet barsAnimated = false;\nconst barObs = new IntersectionObserver((entries) => {\n  entries.forEach(e => {\n    if (e.isIntersecting && !barsAnimated) {\n      barsAnimated = true;\n      document.querySelectorAll('.bar-fill').forEach((bar, i) => {\n        const v = parseFloat(bar.dataset.v);\n        setTimeout(() => { bar.style.width = v + '%'; }, i * 80);\n      });\n    }\n  });\n}, { threshold: 0.2 });\nconst barsEl = document.getElementById('bars');\nif (barsEl) barObs.observe(barsEl);\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
